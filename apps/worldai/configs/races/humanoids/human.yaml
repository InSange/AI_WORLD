id: human
name: 인간
name_en: Human
category: humanoid
preferred_biomes: ["plains", "forest", "lake"]
tier: 1
description: >
  가장 보편적인 종족이나 개체 능력은 평범하다.
  산에서는 엘프보다 느리고, 바다에서는 수인보다 약하며, 추위엔 드워프보다 취약하다.
  그러나 인간의 진짜 강점은 '모이는 것'이다. 여럿이 모여 역할을 나누고
  전술을 짜면 어떤 종족도 쉽게 무시하지 못하는 집단이 된다.

stats:
  max_population: 10000
  growth_rate: 1.005        # 보통 번식 — 압도적 우위 방지
  military_strength: 60
  magic_affinity: 30
  technology_level: 65      # 기술 중상위권, 시간 지나면서 올라감
  adaptability: 95
  lifespan: 25920           # ~72년 (360틱/년)

# 지형 패널티: 인간은 모든 지형 패널티를 정상 적용받는다
# 산악 -20%, 설원 -25%, 사막 -15%, 해안 전투 -20% 등
terrain_penalty_exempt: false

special_traits:
  - id: collective_intelligence
    name: "집단 지성"
    description: >
      인간은 개인보다 집단에서 강해진다.
      동일 영역 내 인구 규모에 따라 기술 연구 속도 보정:
      인구 500 이상: +10%, 1000 이상: +20%, 2000 이상: +30%.
      단, 혼자 또는 소규모(100 이하)일 때는 연구 속도 -10%.

  - id: formation_tactics
    name: "전술 조합"
    description: >
      인간은 개체 전투력이 낮지만 역할 분담으로 보완한다.
      동일 전투에 참가하는 인간 유닛 수에 따라 전투력 보정:
        100명 미만: 보정 없음 (개체 약점 그대로)
        100~499명: +15% (소부대 전술)
        500~999명: +25% (대형 전투 대형)
        1000명 이상: +35% (군단 전투)
      단, 사기(morale)가 낮으면 이 보정이 절반으로 감소.

  - id: knowledge_sharing
    name: "지식 공유"
    description: >
      인간 정착지에서는 지식이 빠르게 퍼진다.
      교역로가 연결된 도시 수가 많을수록 기술 연구 공유 효율 증가.
      타 종족과 동맹 시 해당 종족 기술의 10%를 흡수 학습.

behavior:
  aggression: 0.40
  expansion_drive: 0.60
  alliance_tendency: 0.65   # 다른 종족과 협력할 때 진짜 강해지므로 동맹 선호
  trade_focus: 0.70
  isolationism: 0.10

diplomacy_trait:
  trust_rate: 1.0
  grudge_rate: 0.9
  memory_duration: 200      # 비교적 짧은 기억
  betrayal_penalty: 15

diplomacy_defaults:
  - target: elf
    affinity: 10            # 동경하지만 상대가 경계
  - target: dwarf
    affinity: 40
  - target: halfling
    affinity: 50
  - target: orc
    affinity: -20
  - target: beastman
    affinity: 5
  - target: undead
    affinity: -50
  - target: angel_demon
    affinity: 20
  - target: golem
    affinity: 15
